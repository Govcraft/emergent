name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build emergent for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p emergent-engine

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p emergent-engine

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          ARCHIVE_NAME="emergent-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/emergent dist/
          cd dist
          tar -czvf ../${ARCHIVE_NAME} emergent
          cd ..
          sha256sum ${ARCHIVE_NAME} > ${ARCHIVE_NAME}.sha256
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emergent-${{ matrix.target }}
          path: |
            *.tar.gz
            *.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Import GPG key
        env:
          GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_KEY" | gpg --batch --import

      - name: Sign tarballs and create checksums
        env:
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
        run: |
          cd artifacts
          for f in *.tar.gz; do
            gpg --batch --yes --local-user "$GPG_FINGERPRINT" --detach-sign --armor "$f"
          done
          cat *.sha256 > checksums.txt
          mv checksums.txt ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.asc
            artifacts/*.sha256
            checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  crates-io:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish emergent-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p emergent-engine

  aur:
    name: Update AUR package
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Extract version
        env:
          REF: ${{ github.ref }}
        run: echo "VERSION=${REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Download checksums
        run: |
          curl -sL "https://github.com/Govcraft/emergent/releases/download/v${VERSION}/checksums.txt" -o checksums.txt
          echo "SHA256_X86_64=$(grep x86_64-unknown-linux-gnu checksums.txt | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA256_AARCH64=$(grep aarch64-unknown-linux-gnu checksums.txt | awk '{print $1}')" >> $GITHUB_ENV

      - name: Configure SSH
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Clone and update AUR package
        run: |
          git clone ssh://aur@aur.archlinux.org/emergent-bin.git aur-pkg
          cd aur-pkg

          T=$(printf '\t')

          cat > PKGBUILD <<PKGBUILD_EOF
          # Maintainer: Roland Rodriguez <roland@govcraft.ai>
          pkgname=emergent-bin
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Event-driven workflow engine using publish-subscribe primitives"
          arch=('x86_64' 'aarch64')
          url="https://github.com/Govcraft/emergent"
          license=('MIT' 'Apache-2.0')
          provides=('emergent')
          conflicts=('emergent')

          validpgpkeys=('EDAAD3730AB9855765E57445965785C9F837377C')

          source_x86_64=("\${url}/releases/download/v\${pkgver}/emergent-\${pkgver}-x86_64-unknown-linux-gnu.tar.gz"
                         "\${url}/releases/download/v\${pkgver}/emergent-\${pkgver}-x86_64-unknown-linux-gnu.tar.gz.asc")
          source_aarch64=("\${url}/releases/download/v\${pkgver}/emergent-\${pkgver}-aarch64-unknown-linux-gnu.tar.gz"
                          "\${url}/releases/download/v\${pkgver}/emergent-\${pkgver}-aarch64-unknown-linux-gnu.tar.gz.asc")
          sha256sums_x86_64=('${SHA256_X86_64}' 'SKIP')
          sha256sums_aarch64=('${SHA256_AARCH64}' 'SKIP')

          package() {
              install -Dm755 emergent "\${pkgdir}/usr/bin/emergent"
          }
          PKGBUILD_EOF

          cat > .SRCINFO <<SRCINFO_EOF
          pkgbase = emergent-bin
          ${T}pkgdesc = Event-driven workflow engine using publish-subscribe primitives
          ${T}pkgver = ${VERSION}
          ${T}pkgrel = 1
          ${T}url = https://github.com/Govcraft/emergent
          ${T}arch = x86_64
          ${T}arch = aarch64
          ${T}license = MIT
          ${T}license = Apache-2.0
          ${T}provides = emergent
          ${T}conflicts = emergent
          ${T}validpgpkeys = EDAAD3730AB9855765E57445965785C9F837377C
          ${T}source_x86_64 = https://github.com/Govcraft/emergent/releases/download/v${VERSION}/emergent-${VERSION}-x86_64-unknown-linux-gnu.tar.gz
          ${T}source_x86_64 = https://github.com/Govcraft/emergent/releases/download/v${VERSION}/emergent-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.asc
          ${T}sha256sums_x86_64 = ${SHA256_X86_64}
          ${T}sha256sums_x86_64 = SKIP
          ${T}source_aarch64 = https://github.com/Govcraft/emergent/releases/download/v${VERSION}/emergent-${VERSION}-aarch64-unknown-linux-gnu.tar.gz
          ${T}source_aarch64 = https://github.com/Govcraft/emergent/releases/download/v${VERSION}/emergent-${VERSION}-aarch64-unknown-linux-gnu.tar.gz.asc
          ${T}sha256sums_aarch64 = ${SHA256_AARCH64}
          ${T}sha256sums_aarch64 = SKIP

          pkgname = emergent-bin
          SRCINFO_EOF

          git config user.name "Roland Rodriguez"
          git config user.email "roland@govcraft.ai"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${VERSION}"
          git push origin master
