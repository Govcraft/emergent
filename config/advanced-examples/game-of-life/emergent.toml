# Game of Life — emergent behavior from simple rules
#
# A timer ticks generations and a stateful Python handler evolves the
# world, self-seeding from LIFE_PATTERN on its first tick. Two sinks
# render output: a browser canvas via SSE and ASCII art on the console.
#
# Prerequisites:
#   emergent marketplace install exec-source exec-sink sse-sink
#
# Usage:
#   emergent --config ./config/advanced-examples/game-of-life/emergent.toml
#   # Open http://localhost:8082 for the browser visualization
#
# Change pattern: set LIFE_PATTERN to one of:
#   glider, blinker, pulsar, r-pentomino, acorn, gosper-gun
#
#   LIFE_PATTERN=gosper-gun emergent --config ./config/advanced-examples/game-of-life/emergent.toml

[engine]
name = "game-of-life"
socket_path = "auto"
api_port = 0

# =============================================================================
# Sources
# =============================================================================

# Banner — print the dashboard URL to the engine's terminal once at startup.
# A bare `sh` process inherits stdio from the engine; exec-source would
# capture stdout/stderr into exec.output/exec.error events instead.
[[sources]]
name = "banner"
path = "sh"
args = ["-c", "printf '\\n  Dashboard: http://localhost:8082\\n\\n'; exec sleep infinity"]
publishes = []

# Static file server for dashboard
[[sources]]
name = "webserver"
path = "~/.local/share/emergent/primitives/bin/exec-source"
args = ["--shell", "sh", "--command", "python3 -m http.server 8082 -d ${EMERGENT_DASHBOARD_DIR:-config/advanced-examples/game-of-life} & echo $! > /tmp/emergent-life-webserver.pid && echo '{\"status\":\"started\"}'"]
publishes = ["webserver.started"]

# Generation clock
[[sources]]
name = "clock"
path = "~/.local/share/emergent/primitives/bin/exec-source"
args = ["--shell", "sh", "--command", "echo '{\"tick\":true}'", "--interval", "150"]
publishes = ["life.tick"]

# =============================================================================
# Handler — stateful Game of Life world
# =============================================================================

[[handlers]]
name = "world"
path = "uv"
args = ["run", "--python", ">=3.12", "--with", "emergent-client", "config/advanced-examples/game-of-life/world.py"]
subscribes = ["life.tick"]
publishes = ["life.frame"]

# =============================================================================
# Webserver lifecycle
# =============================================================================

[[handlers]]
name = "webserver-stop"
path = "~/.local/share/emergent/primitives/bin/exec-handler"
args = ["-s", "system.shutdown.requested", "--", "sh", "-c", "kill $(cat /tmp/emergent-life-webserver.pid 2>/dev/null) 2>/dev/null; rm -f /tmp/emergent-life-webserver.pid; jq -nc '{status: \"stopped\"}'"]
subscribes = ["system.shutdown.requested"]
publishes = ["webserver.stopped"]

# =============================================================================
# Sinks
# =============================================================================

# Browser canvas via SSE
[[sinks]]
name = "dashboard"
path = "~/.local/share/emergent/primitives/bin/sse-sink"
args = ["--port", "8083"]
subscribes = ["life.frame"]

# ASCII console output
[[sinks]]
name = "console"
path = "~/.local/share/emergent/primitives/bin/exec-sink"
args = ["-s", "life.frame", "--", "jq", "-r", "\"Gen \\(.generation) | Pop \\(.population)\""]
subscribes = ["life.frame"]
