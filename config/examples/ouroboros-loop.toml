# Ouroboros Loop: self-seeding infinite loop
#
# Starts automatically — no manual curl needed. An exec-source seeds the
# loop, then the message circulates forever with an incrementing counter.
#
# Prerequisites:
#   emergent marketplace install http-source exec-source exec-handler exec-sink
#
# Usage:
#   emergent --config ./config/examples/ouroboros-loop.toml

[engine]
name = "ouroboros"
socket_path = "auto"
api_port = 0

[[sources]]
name = "webhook"
path = "~/.local/share/emergent/primitives/bin/http-source"
args = ["--port", "8088"]
publishes = ["http.request"]

# Seed the loop once (sleep 2 to let http-source bind first)
[[sources]]
name = "seed"
path = "~/.local/share/emergent/primitives/bin/exec-source"
args = ["--shell", "sh", "--command", "sleep 2 && curl -s -X POST -H 'Content-Type: application/json' -d '{\"count\": 0, \"message\": \"hello ouroboros\"}' http://localhost:8088"]
publishes = ["exec.output"]

[[handlers]]
name = "enrich"
path = "~/.local/share/emergent/primitives/bin/exec-handler"
args = ["-s", "http.request", "--publish-as", "loop.iteration", "--", "jq", "-c", ".body |= (fromjson? // {count: 0}) | .body.count += 1 | .body.timestamp = now | .body |= tojson"]
subscribes = ["http.request"]
publishes = ["loop.iteration"]

[[sinks]]
name = "printer"
path = "~/.local/share/emergent/primitives/bin/exec-sink"
args = ["-s", "loop.iteration", "--", "jq", "."]
subscribes = ["loop.iteration"]

[[sinks]]
name = "loopback"
path = "~/.local/share/emergent/primitives/bin/exec-sink"
args = ["-s", "loop.iteration", "--", "sh", "-c", "sleep 1 && jq -r .body | curl -s -X POST -H 'Content-Type: application/json' -d @- http://localhost:8088"]
subscribes = ["loop.iteration"]
